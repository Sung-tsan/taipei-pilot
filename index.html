<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>台北小飛官</title>
  <style>
    /* —— 設計 token：single source = DESIGN_WEB_UI.md §2（勿在別處硬編色值）—— */
    :root {
      --ui-bg: #1a2233; --ui-panel: #2a3450; --ui-panel-2: #3a4666;
      --ui-ink: #f2ead8; --ui-ink-dim: #f2ead8aa;
      --candy-amber: #f2b94b; --candy-amber-d: #b8852a;
      --candy-green: #7fc97f; --candy-green-d: #4e8a4e;
      --candy-red: #e0533d; --grass: #9dbf7b; --river: #8fc7d6;
      --teal-101: #4fb6a0; --beige: #efe6cf;
      --slot-0: #e0533d; --slot-1: #3d7be0;
      --r-sm: 10px; --r-md: 14px; --r-lg: 20px; --r-pill: 999px;
      --press-lift: 5px; --press-drop: 3px;
      --hud-fz: 18px; --hud-fz-lg: 34px; --hud-shadow: 0 2px 4px #0008;
      --hud-pad: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--ui-bg); color: var(--ui-ink); font-family: 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif; }
    #gameCanvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; image-rendering: pixelated; }

    /* —— 連線面板（沒人連線時全版） —— */
    #joinPanel {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; z-index: 10;
      background: #1a2233ee; text-align: center;
    }
    #joinPanel h1 { font-size: 40px; letter-spacing: 2px; }
    #joinPanel .sub { font-size: 17px; opacity: .75; line-height: 1.8; }
    #qr { border-radius: var(--r-md); }
    #qrUrl { font-size: 13px; opacity: .5; font-family: ui-monospace, monospace; }
    #slotChips { display: flex; gap: 14px; }
    .chip { padding: 10px 22px; border-radius: var(--r-pill); background: var(--ui-panel); font-size: 16px; font-weight: 600; opacity: .55; }
    .chip.active { opacity: 1; }
    #kbHint { font-size: 13px; opacity: .4; }

    /* 中央分隔線（分屏時） */
    #splitLine { position: fixed; top: 0; bottom: 0; left: calc(50vw - 1px); width: 2px; background: var(--ui-bg); z-index: 4; display: none; }

    /* 角落小 QR（還有空位時） */
    #miniQr { position: fixed; right: 18px; bottom: 18px; z-index: 5; display: none; flex-direction: column; align-items: center; gap: 6px; background: #222b44cc; padding: 12px; border-radius: var(--r-md); }
    #miniQr.show { display: flex; }
    #miniQr span { font-size: 12px; opacity: .8; }
    #miniQr canvas { width: 110px !important; height: 110px !important; border-radius: 8px; }

    /* 斷線等待提示（每 slot） */
    .lostBadge {
      position: fixed; top: 18px; padding: 10px 18px; border-radius: var(--r-md);
      background: #222b44dd; font-size: 16px; z-index: 7; display: none;
    }
    #lost0 { left: 18px; } #lost1 { right: 18px; }

    /* ========================================================================
       HUD 6 槽位框架（UI 層的 B1）—— 每視口一層 hud-layer，內含固定槽位。
       分屏時 body.split → 左右半屏；槽位在層內絕對定位、後階段填內容不搬家。
       契約見 DESIGN_WEB_UI.md §5；顯隱由 src/display/ui/hud.js 控制。
       ======================================================================== */
    .hud-layer {
      position: fixed; top: 0; bottom: 0; left: 0; width: 100vw;
      z-index: 6; pointer-events: none; display: none;
    }
    .hud-layer.show { display: block; }
    body.split #hud-0 { left: 0;    width: 50vw; }
    body.split #hud-1 { left: 50vw; width: 50vw; }

    .slot {
      position: absolute; display: none; align-items: center; gap: 8px;
      font-size: var(--hud-fz); font-weight: 700; color: var(--ui-ink);
      text-shadow: var(--hud-shadow);
      background: #1a223355; padding: 8px 16px; border-radius: var(--r-pill);
      white-space: nowrap;
    }
    .slot.show { display: flex; }

    /* StatusSlot 下移讓出左上全域控制列 #topBtns（top16+高46→底62）；保留設計 §5「StatusSlot=左上」契約 */
    .status-slot { top: calc(var(--hud-pad) + 54px); left: var(--hud-pad); }
    .task-slot   { top: var(--hud-pad); left: 50%; transform: translateX(-50%); }
    .mode-slot   { top: var(--hud-pad); right: var(--hud-pad); }
    .alt-band    { top: 50%; right: var(--hud-pad); transform: translateY(-50%); }
    .home-slot   { bottom: calc(var(--hud-pad) + env(safe-area-inset-bottom, 0px)); left: var(--hud-pad); font-size: 15px; }
    .home-slot .arrow { display: inline-block; font-size: 22px; line-height: 1; transition: transform .15s linear; }

    /* CenterSlot：瞬時 toast overlay（起飛/降落/碰）。持久內容空契約（v1.1-4 填導引/慶祝）。 */
    .center-slot {
      top: 22%; left: 50%; transform: translateX(-50%) scale(.8);
      background: none; padding: 0; text-shadow: 0 3px 8px #0009;
      font-size: var(--hud-fz-lg); font-weight: 800; white-space: nowrap;
      opacity: 0; transition: opacity .25s, transform .25s;
    }
    .center-slot.show { display: block; }
    .center-slot.toast-fx { opacity: 1; transform: translateX(-50%) scale(1); }

    /* 聲音提示 */
    #soundHint { position: fixed; top: 16px; right: 16px; z-index: 8; font-size: 13px; opacity: .55; background: #1a223388; padding: 6px 12px; border-radius: var(--r-pill); display: none; }

    /* —— Tactile 按壓（DESIGN_WEB_UI.md §3）—— */
    .tactile {
      border: none; cursor: pointer;
      box-shadow: 0 var(--press-lift) 0 var(--press-shadow, #0006);
      transition: transform .08s ease, box-shadow .08s ease, background .2s, filter .12s;
    }
    .tactile:active { transform: translateY(var(--press-drop)); box-shadow: 0 calc(var(--press-lift) - var(--press-drop)) 0 var(--press-shadow, #0006); }

    /* —— 設定（後果軸：安全/溫和/真實 + ❤️ 上限）—— */
    /* 左上按鈕列（設定/玩法/收集簿）：高於 joinPanel(10) → 家長可在 join 畫面先設定 */
    #topBtns { position: fixed; top: 16px; left: 16px; z-index: 11; display: flex; gap: 8px; align-items: center; }
    .top-btn {
      height: 46px; min-width: 46px; border-radius: var(--r-pill); border: none; cursor: pointer;
      font-size: 20px; background: #1a223399; color: var(--ui-ink); padding: 0 12px;
    }
    #playModeBtn { font-size: 15px; font-weight: 700; }
    #settings { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; background: #0b0f18cc; }
    #settings.hidden { display: none; }
    .settings-card { background: var(--ui-panel); border-radius: var(--r-lg); padding: 26px 30px; max-width: 92vw; text-align: center; display: flex; flex-direction: column; gap: 18px; }
    .settings-card h2 { font-size: 24px; }
    .set-section { display: flex; flex-direction: column; gap: 10px; }
    .set-label { font-size: 15px; opacity: .85; }
    .set-label small { opacity: .6; }
    .set-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .set-opt {
      min-width: 64px; padding: 12px 14px; border-radius: var(--r-md);
      font-size: 17px; font-weight: 700; line-height: 1.3; color: var(--ui-ink);
      background: var(--ui-panel-2); --press-shadow: #232c47;
    }
    .set-opt small { display: block; font-size: 11px; opacity: .7; font-weight: 500; }
    .set-opt.active { background: var(--candy-amber); color: var(--ui-bg); --press-shadow: var(--candy-amber-d); }
    #limitSection.disabled { opacity: .4; pointer-events: none; }
    #settingsClose { background: var(--candy-green); color: var(--ui-bg); --press-shadow: var(--candy-green-d); padding: 14px 0; border-radius: var(--r-md); font-size: 18px; font-weight: 800; }

    /* 任務卡方向箭頭（TaskSlot 內） */
    .t-arrow { display: inline-block; font-size: 20px; line-height: 1; transition: transform .15s linear; }

    /* —— 收集簿 —— */
    #collection { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; background: #0b0f18cc; }
    #collection.hidden { display: none; }
    .collection-card { background: var(--ui-panel); border-radius: var(--r-lg); padding: 24px 28px; max-width: 92vw; max-height: 86vh; overflow: auto; text-align: center; display: flex; flex-direction: column; gap: 14px; }
    .collection-card h2 { font-size: 24px; }
    #collectionCount { font-size: 14px; opacity: .8; }
    #collectionList { list-style: none; display: flex; flex-direction: column; gap: 8px; text-align: left; }
    #collectionList li { background: var(--ui-panel-2); border-radius: var(--r-md); padding: 10px 14px; font-size: 16px; opacity: .55; }
    #collectionList li.lit { opacity: 1; background: #3a4a3a; }
    #collectionList li small { display: block; font-size: 12px; opacity: .8; margin-top: 2px; }
    #collectionClose, #celebrateReplay { border: none; cursor: pointer; border-radius: var(--r-md); padding: 12px 18px; font-size: 16px; font-weight: 800; }
    #collectionClose { background: var(--candy-green); color: var(--ui-bg); --press-shadow: var(--candy-green-d); }
    #celebrateReplay { background: var(--candy-amber); color: var(--ui-bg); --press-shadow: var(--candy-amber-d); display: none; }

    /* —— 台北飛透透大慶祝 —— */
    #celebration { position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; background: radial-gradient(ellipse at center, #1a2a4a 0%, #0b0f18 80%); text-align: center; }
    #celebration.hidden { display: none; }
    #celebration .fireworks { font-size: 64px; letter-spacing: 8px; animation: pop 1.2s ease-in-out infinite; }
    #celebration h1 { font-size: 40px; color: var(--candy-amber); text-shadow: 0 3px 10px #0009; }
    #celebration p { font-size: 17px; opacity: .85; }
    @keyframes pop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }
    #celebrationClose { margin-top: 8px; border: none; cursor: pointer; border-radius: var(--r-md); padding: 14px 26px; font-size: 18px; font-weight: 800; background: var(--candy-green); color: var(--ui-bg); --press-shadow: var(--candy-green-d); }

    /* debug 面板（?debug=1） */
    #debug { position: fixed; left: 10px; bottom: 10px; z-index: 9; font: 12px ui-monospace, monospace; color: #cfe0a8; background: #1a2233aa; padding: 8px 10px; border-radius: 8px; white-space: pre; display: none; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="splitLine"></div>

  <div id="joinPanel">
    <h1>🛫 台北小飛官</h1>
    <p class="sub">用手機掃 QR code，手機就變成飛機操縱桿！<br/>最多兩台飛機一起飛</p>
    <canvas id="qr"></canvas>
    <div id="qrUrl"></div>
    <div id="slotChips">
      <div class="chip" id="chip0">🔴 紅機</div>
      <div class="chip" id="chip1">🔵 藍機</div>
    </div>
    <p class="sub" id="serverStatus"></p>
    <p id="kbHint">（開發用：按方向鍵 + W/S 油門可直接用鍵盤開紅機）</p>
  </div>

  <div class="lostBadge" id="lost0">🔴 紅機斷線了，盤旋等你回來…</div>
  <div class="lostBadge" id="lost1">🔵 藍機斷線了，盤旋等你回來…</div>

  <div id="miniQr">
    <span>再掃一支 = 第二台飛機</span>
    <canvas id="qrMini"></canvas>
  </div>

  <!-- HUD 6 槽位：每視口一層（分屏時左右各一套）。內容由 src/display/ui/hud.js 注入。 -->
  <div class="hud-layer" id="hud-0">
    <div class="slot status-slot" data-slot="StatusSlot"></div>
    <div class="slot task-slot"   data-slot="TaskSlot"></div>
    <div class="slot mode-slot"   data-slot="ModeSlot"></div>
    <div class="slot center-slot" data-slot="CenterSlot"></div>
    <div class="slot alt-band"    data-slot="AltBand"></div>
    <div class="slot home-slot"   data-slot="HomeSlot"><span class="arrow">⬆️</span><span class="home-label"></span></div>
  </div>
  <div class="hud-layer" id="hud-1">
    <div class="slot status-slot" data-slot="StatusSlot"></div>
    <div class="slot task-slot"   data-slot="TaskSlot"></div>
    <div class="slot mode-slot"   data-slot="ModeSlot"></div>
    <div class="slot center-slot" data-slot="CenterSlot"></div>
    <div class="slot alt-band"    data-slot="AltBand"></div>
    <div class="slot home-slot"   data-slot="HomeSlot"><span class="arrow">⬆️</span><span class="home-label"></span></div>
  </div>

  <div id="soundHint">🔇 點一下畫面開聲音</div>

  <!-- 左上按鈕列：設定 / 玩法模式 / 收集簿 -->
  <div id="topBtns">
    <button id="settingsBtn" class="top-btn" title="設定">⚙️</button>
    <button id="playModeBtn" class="top-btn" title="玩法模式">🎯 任務模式</button>
    <button id="collectionBtn" class="top-btn" title="收集簿">📖</button>
  </div>

  <!-- 設定（後果軸）modal -->
  <div id="settings" class="hidden">
    <div class="settings-card">
      <h2>設定 ⚙️</h2>
      <div class="set-section">
        <div class="set-label">撞到了會怎樣？</div>
        <div id="modeRow" class="set-row">
          <button class="set-opt tactile" data-mode="safe">🛡️ 安全<small>彈開不墜</small></button>
          <button class="set-opt tactile" data-mode="gentle">❤️ 溫和<small>有幾條命</small></button>
          <button class="set-opt tactile" data-mode="real">🔥 真實<small>會冒煙墜毀</small></button>
        </div>
      </div>
      <div class="set-section" id="limitSection">
        <div class="set-label">❤️ 幾條命？<small>（溫和模式）</small></div>
        <div id="limitRow" class="set-row">
          <button class="set-opt tactile" data-limit="1">1</button>
          <button class="set-opt tactile" data-limit="2">2</button>
          <button class="set-opt tactile" data-limit="3">3</button>
          <button class="set-opt tactile" data-limit="4">4</button>
          <button class="set-opt tactile" data-limit="5">5</button>
          <button class="set-opt tactile" data-limit="inf">∞</button>
        </div>
      </div>
      <button id="settingsClose" class="tactile">完成</button>
    </div>
  </div>

  <!-- 收集簿（點亮地標 + 完成任務；雙人共享）-->
  <div id="collection" class="hidden">
    <div class="collection-card">
      <h2>📖 收集簿</h2>
      <div id="collectionCount"></div>
      <ul id="collectionList"></ul>
      <button id="celebrateReplay" class="tactile">🎆 重看台北飛透透</button>
      <button id="collectionClose" class="tactile">完成</button>
    </div>
  </div>

  <!-- 台北飛透透大慶祝（全地標點亮一次性 gate）-->
  <div id="celebration" class="hidden">
    <div class="fireworks">🎆🎇🎆</div>
    <h1>台北飛透透！</h1>
    <p>全部地標都點亮了，你把整個台北都飛遍了！👏</p>
    <button id="celebrationClose" class="tactile">耶！</button>
  </div>

  <div id="debug"></div>
  <script type="module" src="/src/display/main.js"></script>
</body>
</html>
