<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>台北小飛官 — 遙控器</title>
  <style>
    /* —— 設計 token：single source = DESIGN_WEB_UI.md §2（與 display 一致）—— */
    :root {
      --ui-bg: #1a2233; --ui-panel: #2a3450; --ui-panel-2: #3a4666;
      --ui-ink: #f2ead8; --ui-ink-dim: #f2ead8aa;
      --candy-amber: #f2b94b; --candy-amber-d: #b8852a;
      --candy-green: #7fc97f; --candy-green-d: #4e8a4e;
      --candy-red: #e0533d; --slot-0: #e0533d; --slot-1: #3d7be0;
      --r-sm: 10px; --r-md: 14px; --r-lg: 20px; --r-pill: 999px;
      --press-lift: 5px; --press-drop: 3px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    html, body {
      height: 100%; overflow: hidden; touch-action: none; overscroll-behavior: none;
      background: #1a2233; color: #f2ead8;
      font-family: 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif;
    }
    /* height:100dvh＝可視高（iOS Safari 工具列顯示時也對齊）；避免 inset:0 用到「大 viewport」害內容被工具列蓋掉 */
    .screen { position: fixed; inset: 0; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 18px; text-align: center; }
    .hidden { display: none !important; }

    /* —— 開始畫面 —— */
    #startBtn {
      font-size: 26px; font-weight: 700; color: #1a2233;
      background: #f2b94b; border: none; border-radius: 22px;
      padding: 22px 40px; box-shadow: 0 6px 0 #b8852a;
      transition: transform .08s, box-shadow .08s;
    }
    #startBtn:active { transform: translateY(4px) scale(.98); box-shadow: 0 2px 0 #b8852a; }
    .hint { font-size: 14px; line-height: 1.65; opacity: .75; }
    .hold-pic { font-size: 44px; }

    /* —— 校準畫面（橫向：說明左、泡泡中、按鈕右） —— */
    #calibrate { flex-direction: row; gap: 26px; }
    #calibrate .col { display: flex; flex-direction: column; gap: 10px; align-items: center; max-width: 34vw; }
    #calDoneBtn {
      font-size: 21px; font-weight: 700; color: #1a2233;
      background: #7fc97f; border: none; border-radius: 18px;
      padding: 20px 26px; box-shadow: 0 5px 0 #4e8a4e;
    }
    #calDoneBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 #4e8a4e; }

    /* —— 操控畫面（橫向三欄：起落架 | 姿態 | 油門） —— */
    #control {
      display: grid;
      grid-template-columns: minmax(110px, 1fr) auto minmax(92px, 1fr);
      /* minmax(0,1fr)＝主操控列可縮到比內容還小（短橫螢幕不裁切，靠下面尺寸縮放吸收）*/
      grid-template-rows: auto minmax(0, 1fr) auto; /* banner / 主操控 / 複雜版操控列（簡單版該列空 → 0 高）*/
      gap: 10px 16px; min-height: 0;
      padding: max(10px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right))
               max(10px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    }
    #slotBanner {
      grid-column: 1 / -1; border-radius: 14px; padding: 8px 16px;
      font-size: 17px; font-weight: 700; display: flex; justify-content: space-between; align-items: center;
      background: #2a3450;
    }
    #statusDot { font-size: 13px; font-weight: 500; opacity: .85; }

    /* 左欄：起落架（左拇指） */
    #leftCol { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; min-height: 0; }
    #gearBtn {
      width: 100%; max-width: 170px; min-height: 96px;
      font-size: 19px; font-weight: 800; color: #1a2233; line-height: 1.35;
      border: none; border-radius: 20px;
      background: #7fc97f; box-shadow: 0 5px 0 #4e8a4e;
      transition: transform .08s, box-shadow .08s, background .2s;
    }
    #gearBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 #4e8a4e; }
    #gearBtn.up { background: #9aa7c0; box-shadow: 0 5px 0 #5e6b85; }
    #gearBtn.up:active { box-shadow: 0 2px 0 #5e6b85; }
    #gearHint { font-size: 12px; opacity: .55; }

    /* 中欄：姿態泡泡 + 校正 */
    #midCol { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-height: 0; }
    /* 姿態泡泡綁可視高（34vh）→ 螢幕越矮越小，不擠掉下方校正/動作鍵 */
    #attitude { width: min(34vh, 230px); aspect-ratio: 1; border-radius: 50%; flex-shrink: 0; }
    #calBtn {
      font-size: 14px; font-weight: 600; color: #f2ead8;
      background: #3a4666; border: none; border-radius: 12px; padding: 10px 18px;
      box-shadow: 0 3px 0 #232c47;
    }
    #calBtn:active { transform: translateY(2px); box-shadow: 0 1px 0 #232c47; }

    /* 右欄：油門（右拇指） */
    #thrTrack {
      position: relative; border-radius: 16px; justify-self: end;
      background: #2a3450; overflow: hidden; width: 100%; max-width: 110px; height: 100%;
    }
    #thrFill { position: absolute; left: 0; right: 0; bottom: 0; height: 0%; background: linear-gradient(180deg, #f2b94b, #e08a3d); }
    #thrLabel { position: absolute; top: 8px; left: 0; right: 0; text-align: center; font-size: 13px; opacity: .7; z-index: 1; }

    /* 撞擊閃紅（iOS 無震動的 fallback） */
    #flash { position: fixed; inset: 0; pointer-events: none; opacity: 0; background: radial-gradient(ellipse at center, transparent 40%, #e0533d 100%); }
    #flash.flash { animation: flashAnim .45s ease-out; }
    @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

    /* 橫拿 guard（直拿時蓋住） */
    #rotateGuard { background: #1a2233; z-index: 50; font-size: 19px; line-height: 2; }

    /* —— Tactile 按壓（DESIGN_WEB_UI.md §3）：新元件用，不動既有按鈕手感 —— */
    .tactile {
      border: none; cursor: pointer;
      box-shadow: 0 var(--press-lift) 0 var(--press-shadow, #0006);
      transition: transform .08s ease, box-shadow .08s ease, background .2s, filter .12s;
    }
    .tactile:active {
      transform: translateY(var(--press-drop));
      box-shadow: 0 calc(var(--press-lift) - var(--press-drop)) 0 var(--press-shadow, #0006);
    }

    /* —— context 動作鍵 slot（2 顆可替換大鍵，預設 喇叭/降落輔助）—— */
    #ctxKeys { display: flex; gap: 12px; width: 100%; justify-content: center; margin-top: 4px; }
    .ctx-key {
      flex: 1 1 0; min-height: 64px; max-width: 150px;
      font-size: 16px; font-weight: 800; line-height: 1.25; color: var(--ui-bg);
      border-radius: var(--r-md); padding: 8px 6px;
      background: var(--candy-amber); --press-shadow: var(--candy-amber-d);
    }
    .ctx-key:nth-child(2) { background: var(--candy-green); --press-shadow: var(--candy-green-d); }
    .ctx-key.held { filter: brightness(.88); }
    .ctx-hint { font-size: 11px; font-weight: 600; opacity: .8; }

    /* —— scheme 選擇（簡單/複雜，每支手機自選）—— */
    #scheme .scheme-cards { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
    .scheme-card {
      font-size: 22px; font-weight: 800; color: var(--ui-bg); line-height: 1.4;
      background: var(--candy-amber); --press-shadow: var(--candy-amber-d);
      border-radius: var(--r-lg); padding: 24px 22px; min-width: 150px;
    }
    #schemeComplex { background: var(--candy-green); --press-shadow: var(--candy-green-d); }
    .scheme-sub { font-size: 13px; font-weight: 600; opacity: .85; }

    /* —— 複雜版操控列（方向舵/襟翼/配平/儀表）：簡單版隱藏（該 grid 列塌成 0）—— */
    .complex-only { display: none; }
    body.scheme-complex .complex-only { display: flex; }
    #complexBar {
      grid-column: 1 / -1; align-items: center; justify-content: space-between;
      gap: 10px 14px; flex-wrap: wrap;
      background: var(--ui-panel); border-radius: var(--r-md); padding: 8px 12px;
    }
    #instruments { display: flex; gap: 16px; }
    .instr { display: flex; flex-direction: column; align-items: center; line-height: 1.05; }
    .instr b { font-size: 18px; font-weight: 800; }
    .instr small { font-size: 10px; opacity: .6; }
    #flaps, #trimBox, #rudderBox { display: flex; align-items: center; gap: 8px; }
    .ctl-label { font-size: 12px; opacity: .8; white-space: nowrap; }
    .flap-seg {
      width: 38px; height: 38px; border-radius: var(--r-sm);
      font-size: 16px; font-weight: 800; color: var(--ui-ink);
      background: var(--ui-panel-2); --press-shadow: #232c47;
    }
    .flap-seg.active { background: var(--candy-amber); color: var(--ui-bg); --press-shadow: var(--candy-amber-d); }
    #trim { width: 96px; accent-color: var(--candy-amber); }
    #rudderTrack { position: relative; width: 140px; height: 30px; background: var(--ui-panel-2); border-radius: var(--r-pill); touch-action: none; }
    #rudderTrack::after { content: ''; position: absolute; left: 50%; top: 5px; bottom: 5px; width: 2px; background: #0005; transform: translateX(-50%); }
    #rudderKnob { position: absolute; top: 50%; left: 50%; width: 26px; height: 26px; border-radius: 50%; background: var(--candy-amber); transform: translate(-50%, -50%); box-shadow: 0 2px 0 var(--candy-amber-d); }

    /* —— 短橫螢幕（iPhone 12 等小手機橫拿，可視高 ≤430px）：收緊尺寸，操控面板不裁切 —— */
    @media (max-height: 430px) {
      #control { gap: 6px 14px; }
      #slotBanner { padding: 5px 14px; font-size: 15px; }
      #midCol { gap: 6px; }
      #attitude { width: min(30vh, 168px); }
      #calBtn { padding: 7px 14px; font-size: 13px; }
      #ctxKeys { margin-top: 0; gap: 8px; }
      .ctx-key { min-height: 50px; font-size: 15px; padding: 6px 4px; }
      .ctx-hint { font-size: 10px; }
      #gearBtn { min-height: clamp(60px, 19vh, 88px); font-size: 17px; }
      #gearHint { font-size: 11px; }
      /* 複雜版操控列：短螢幕更緊湊 */
      #complexBar { padding: 5px 10px; gap: 6px 10px; }
      .instr b { font-size: 15px; }
      .flap-seg { width: 32px; height: 32px; font-size: 14px; }
      #rudderTrack { width: 110px; height: 26px; }
    }
  </style>
</head>
<body>
  <!-- 開始畫面：requestPermission 必須在這顆按鈕的 tap handler 內 -->
  <div id="start" class="screen">
    <div class="hold-pic">📱✈️</div>
    <h1 style="font-size:24px">台北小飛官</h1>
    <p class="hint">把手機<b>橫拿</b>、像端著遙控器一樣雙手握兩端<br/>面朝上斜斜的（約 45°）<br/>左右傾 = 轉彎，前後傾 = 抬頭低頭</p>
    <button id="startBtn">🛫 開始操控</button>
    <p id="startErr" class="hint" style="color:#e08a8a"></p>
  </div>

  <!-- 操控模式選擇（每支手機自選；選過存 tp_remote_scheme，下次直接跳過）-->
  <div id="scheme" class="screen hidden">
    <h2 style="font-size:22px">選操控模式 🎮</h2>
    <div class="scheme-cards">
      <button id="schemeSimple" class="tactile scheme-card">🧒 簡單<br/><span class="scheme-sub">油門＋傾斜＋起落架<br/>給小小孩</span></button>
      <button id="schemeComplex" class="tactile scheme-card">🧑‍✈️ 複雜<br/><span class="scheme-sub">＋方向舵／襟翼／配平／儀表<br/>給大人</span></button>
    </div>
  </div>

  <!-- 首次校準（拿好姿勢 → 設為中立位） -->
  <div id="calibrate" class="screen hidden">
    <div class="col">
      <h2 style="font-size:21px">先校準一下 🎯</h2>
      <p class="hint">橫拿手機、雙手握兩端<br/>面朝上斜斜的（約 45°）、手放鬆<br/>泡泡會跟著你的手動</p>
    </div>
    <canvas id="calCanvas" width="220" height="220" style="border-radius:50%"></canvas>
    <div class="col">
      <button id="calDoneBtn">✅ 就是這個姿勢！</button>
      <p class="hint">之後覺得飄，隨時再按「校正歸零」</p>
    </div>
  </div>

  <!-- 操控畫面 -->
  <div id="control" class="screen hidden">
    <div id="slotBanner">
      <span id="slotName">連線中…</span>
      <span id="statusDot">⏳</span>
    </div>
    <div id="leftCol">
      <button id="gearBtn">🛬 起落架<br/><span id="gearState">已放下</span></button>
      <div id="gearHint">起飛後按它收輪，飛比較快！</div>
    </div>
    <div id="midCol">
      <canvas id="attitude" width="230" height="230"></canvas>
      <button id="calBtn">🎯 校正歸零</button>
      <!-- context 動作鍵 slot：內容由 src/remote/context-keys.js 注入（可替換）-->
      <div id="ctxKeys"></div>
    </div>
    <div id="thrTrack">
      <div id="thrLabel">油門</div>
      <div id="thrFill"></div>
    </div>

    <!-- 複雜版操控列（方向舵/襟翼/配平/迷你儀表）。簡單版 .complex-only 隱藏 → 此列塌成 0 高 -->
    <div id="complexBar" class="complex-only">
      <div id="instruments">
        <span class="instr"><b id="iSpd">0</b><small>km/h</small></span>
        <span class="instr"><b id="iAlt">0</b><small>m</small></span>
        <span class="instr"><b id="iHdg">0</b><small>°航向</small></span>
      </div>
      <div id="flaps">
        <span class="ctl-label">襟翼</span>
        <button class="flap-seg tactile active" data-flap="0">0</button>
        <button class="flap-seg tactile" data-flap="1">1</button>
        <button class="flap-seg tactile" data-flap="2">2</button>
      </div>
      <div id="trimBox">
        <span class="ctl-label">配平</span>
        <input id="trim" type="range" min="-1" max="1" step="0.05" value="0" />
      </div>
      <div id="rudderBox">
        <span class="ctl-label">方向舵</span>
        <div id="rudderTrack"><div id="rudderKnob"></div></div>
      </div>
    </div>
  </div>

  <!-- 滿了 -->
  <div id="full" class="screen hidden">
    <div style="font-size:46px">🛬</div>
    <h2>機庫滿了！</h2>
    <p class="hint">已經有兩台飛機在天上了<br/>下一班再來吧</p>
  </div>

  <div id="flash"></div>
  <div id="rotateGuard" class="screen hidden">📱↻<br/>請把手機轉橫</div>
  <!-- 遊戲中轉直：不中斷，只提示（傾斜操控不受螢幕旋轉影響） -->
  <div id="rotateHint">📱↻ 轉回橫向比較好操作</div>
  <style>
    #rotateHint {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 40; display: none; background: #2a3450ee; padding: 12px 20px;
      border-radius: 14px; font-size: 16px; font-weight: 600; pointer-events: none;
    }
    #rotateHint.show { display: block; }
  </style>

  <script type="module" src="/src/remote/main.js"></script>
</body>
</html>
